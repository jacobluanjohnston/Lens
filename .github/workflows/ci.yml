name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: lens
          POSTGRES_USER: lens
          POSTGRES_PASSWORD: lens
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://lens:lens@localhost:5432/lens

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        run: ruff check backend/

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests
        run: pytest backend/ pipeline/ --tb=short

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --ci

# Source: https://docs.github.com/en/actions/tutorials/build-and-test-code/python
# Source: https://docs.astral.sh/ruff
# Source: https://alembic.sqlalchemy.org
