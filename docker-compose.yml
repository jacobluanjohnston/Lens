services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: lens
      POSTGRES_USER: lens
      POSTGRES_PASSWORD: lens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens -d lens"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://lens:lens@db:5432/lens
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend-next
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-next:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_TARGET=http://backend:8000
    depends_on:
      - backend
    profiles:
      - frontend

volumes:
  pgdata:

